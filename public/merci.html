<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidature envoyée — LILIWATT</title>
<meta http-equiv="refresh" content="5;url=https://liliwatt.fr">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#1e1b4b,#7c3aed);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:#fff;border-radius:20px;padding:48px;text-align:center;max-width:520px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.check{width:80px;height:80px;background:linear-gradient(135deg,#7c3aed,#d946ef);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;animation:pop .5s ease-out}
.check svg{width:40px;height:40px;fill:none;stroke:#fff;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
@keyframes pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
h1{color:#1e1b4b;font-size:26px;margin-bottom:8px}
.sub{color:#374151;font-size:15px;line-height:1.6;margin-bottom:8px}
.email-note{color:#7c3aed;font-size:13px;font-weight:600;margin-bottom:24px}
.redirect{color:#9ca3af;font-size:13px;margin-bottom:12px}
.bar{width:100%;height:6px;background:#ede9fe;border-radius:3px;overflow:hidden}
.fill{height:100%;width:0;background:linear-gradient(90deg,#7c3aed,#d946ef);border-radius:3px;animation:fillBar 5s linear forwards}
@keyframes fillBar{to{width:100%}}
.brand{margin-top:24px;font-size:11px;color:#9ca3af}
</style>
</head>
<body>
<div class="box">
<div class="check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
<h1>Candidature envoyée !</h1>
<p class="sub" id="merciMsg">Merci, votre dossier a bien été reçu.</p>
<p class="email-note">Vous allez recevoir un email de confirmation.</p>
<p class="redirect">Redirection vers liliwatt.fr dans <span id="countdown">5</span> secondes...</p>
<div class="bar"><div class="fill"></div></div>
<p class="brand">LILIWATT — Courtage Énergie B2B & B2C</p>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const prenom = params.get('prenom');
if (prenom) document.getElementById('merciMsg').textContent = 'Merci ' + decodeURIComponent(prenom) + ', votre dossier a bien été reçu.';
let s=5;const c=document.getElementById('countdown');const t=setInterval(()=>{s--;c.textContent=s;if(s<=0){clearInterval(t);window.location.href='https://liliwatt.fr';}},1000);
</script>
</body>
</html>
